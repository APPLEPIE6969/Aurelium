prefix: "<gradient:#FFD700:#FFA500>AurelEconomy</gradient> <dark_gray>» <gray>"

economy:
  balance: "Your balance: <gold>%amount% %symbol%</gold>"
  balance-other: "<yellow>%player%</yellow>'s balance: <gold>%amount% %symbol%</gold>"
  paid: "You paid <yellow>%player%</yellow> <gold>%amount% %symbol%</gold>."
  received: "You received <gold>%amount% %symbol%</gold> from <yellow>%player%</yellow>."
  insufficient-funds: "<red>You do not have enough %currency%!</red>"
