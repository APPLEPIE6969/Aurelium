name: Aurelium
version: '1.3.2'
main: com.aureleconomy.AurelEconomy
api-version: '1.21'
description: A comprehensive economy plugin with Market and Auction House.
authors:
  - APPLEPIE6969
softdepend: [Vault]
permissions:
  aureleconomy.admin:
    description: Allows access to admin commands

    softdepend: [Vault]
  aureleconomy.market:
    description: Allows access to the market
    default: true
  aureleconomy.ah:
    description: Allows access to the auction house
    default: true
  aureleconomy.bal:
    description: Allows checking balance
    default: true
  aureleconomy.pay:
    description: Allows paying others
    default: true
  aureleconomy.sell:
    description: Allows using /sell
    default: true
  aureleconomy.orders:
    description: Allows using /orders
    default: true
  aureleconomy.web:
    description: Allows access to the web dashboard via /web
    default: true
  aureleconomy.stocks:
    description: Allows access to the market stocks via /stocks
    default: true

commands:
  bal:
    description: Check your or another player's balance.
    usage: /bal [player]
    permission: aureleconomy.bal
    aliases: [balance, money]
  pay:
    description: Pay another player.
    usage: /pay <player> <amount>
    permission: aureleconomy.pay
  eco:
    description: Admin economy management.
    usage: /eco <give|take|set> [player] <amount>
    permission: aureleconomy.admin
  market:
    description: Open the market.
    usage: /market
    permission: aureleconomy.market
  ah:
    description: Open the Auction House.
    usage: /ah [sell|bid|collect]
    permission: aureleconomy.ah
    aliases: [auction]
  stocks:
    description: View market item values and trends
    usage: /stocks
    aliases: [stonks]
  sell:
    description: Open the Sell GUI.
    usage: /sell
    permission: aureleconomy.sell
  orders:
    description: Manage Buy Orders - create, fill, cancel, or browse.
    usage: /orders [create|fill|cancel|my|search|help]
    permission: aureleconomy.orders
  web:
    description: Open the web market dashboard in your browser.
    usage: /web
    permission: aureleconomy.web

libraries:
  - org.xerial:sqlite-jdbc:3.45.3.0
